<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebHID Configurator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>WebHID Configurator</h1>
      <div class="header-buttons">
        <button id="connect-btn">Połącz z urządzeniem</button>
        <button id="disconnect-btn" class="btn-danger hidden">Rozłącz</button>
      </div>
    </header>

    <main>
      <section id="status-card" class="card">
        <h2>Stan urządzenia</h2>
        <p id="device-name">Brak połączonego urządzenia</p>
      </section>

      <section id="preview-card" class="card hidden">
        <h2>Układ zczytany z urządzenia</h2>
        <p class="hint">Kliknij przycisk poniżej, aby go wybrać do remapowania:</p>
        
        <div class="device-visual">
          <div id="device-container" class="device-container">
            </div>
        </div>
      </section>

      <section id="mapper-card" class="card hidden">
        <h2>Mapowanie Przycisków</h2>
        
        <div class="control-group">
          <label for="button-select">Wybrany przycisk:</label>
          <select id="button-select">
            </select>
        </div>

        <div class="control-group">
          <label for="action-select">Przypisz akcję (KeyCode):</label>
          <select id="action-select">
            <option value="0x04">Litera 'A'</option>
            <option value="0x05">Litera 'B'</option>
            <option value="0x06">Litera 'C'</option>
            <option value="0x2C">Spacja (Space)</option>
            <option value="0x28">Enter</option>
            <option value="0x01">Lewy Przycisk Myszy</option>
            <option value="0x02">Prawy Przycisk Myszy</option>
            <option value="0x03">Środkowy Przycisk Myszy</option>
          </select>
        </div>

        <button id="save-btn">Zapisz konfigurację do urządzenia</button>
      </section>

      <section id="log-card" class="card">
        <h2>Konsola odebranych pakietów (Inbound HID)</h2>
        <pre id="log-output">Czekam na połączenie...</pre>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
