<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Configurator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Device Configurator</h1>
      <div class="header-buttons">
        <button id="connect-btn">Połącz z urządzeniem</button>
        <button id="disconnect-btn" class="btn-danger hidden">Rozłącz</button>
      </div>
    </header>

    <main>
      <section id="status-card" class="card">
        <h2>Stan urządzenia</h2>
        <p id="device-name">Brak połączonego urządzenia</p>
      </section>

      <section id="visual-card" class="card hidden">
        <h2>Wizualizacja Urządzenia</h2>
        <p class="hint">Kliknij przycisk myszki, aby skonfigurować jego działanie:</p>
        
        <div id="visual-container">
          </div>
      </section>

      <section id="mapper-card" class="card hidden">
        <h2>Mapowanie Funkcji</h2>
        
        <div class="control-group">
          <label>Wybrany element:</label>
          <input type="text" id="selected-display" value="Kliknij element powyżej" readonly />
        </div>

        <div class="control-group">
          <label for="action-select">Przypisz akcję (KeyCode):</label>
          <select id="action-select">
            <option value="0x04">Litera A</option>
            <option value="0x05">Litera B</option>
            <option value="0x2C">Spacja</option>
            <option value="0x28">Enter</option>
            <option value="0x01">Przycisk LPM</option>
            <option value="0x02">Przycisk PPM</option>
          </select>
        </div>

        <button id="save-btn">Zapisz ustawienia</button>
      </section>

      <section id="log-card" class="card">
        <h2>Konsola (Debug Log)</h2>
        <pre id="log-output">Czekam na połączenie...</pre>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
